<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kamm — Legal</title>
<style>
  :root { color-scheme: light dark; --bg:#FBF7F0; --text:#2B241B; --muted:#6B6255; --accent:#2F6F4F; --border:#E7DFD2; }
  @media (prefers-color-scheme: dark) { :root { --bg:#1C1712; --text:#F3ECE0; --muted:#B8AC98; --accent:#5FBE8C; --border:#3A3226; } }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .wrap { max-width:480px; margin:0 auto; padding:64px 24px; text-align:center; }
  .logo { width:64px; height:64px; border-radius:18px; display:block; margin:0 auto 16px; }
  h1 { font-size:26px; margin:0 0 28px; }
  .lang-toggle { display:inline-flex; border:1px solid var(--border); border-radius:10px; padding:3px; margin-bottom:28px; }
  .lang-btn { border:none; background:none; color:var(--muted); font:inherit; font-size:13.5px; font-weight:600; padding:7px 16px; border-radius:8px; cursor:pointer; }
  .lang-btn.active { background:var(--accent); color:#fff; }
  a.card { display:block; margin:14px 0; padding:18px 20px; border:1px solid var(--accent); border-radius:14px; color:var(--accent); text-decoration:none; font-weight:600; }
  .lang-section { display:none; }
  .lang-section.active { display:block; }
</style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="assets/logo.png" alt="Kamm">
    <h1>Kamm</h1>

    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="ar" onclick="setLang('ar')">العربية</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">English</button>
    </div>

    <div id="ar" class="lang-section active">
      <a class="card" href="privacy.html">سياسة الخصوصية</a>
      <a class="card" href="terms.html">شروط الاستخدام</a>
    </div>

    <div id="en" class="lang-section">
      <a class="card" href="privacy.html">Privacy Policy</a>
      <a class="card" href="terms.html">Terms of Service</a>
    </div>
  </div>

  <script>
    function setLang(lang) {
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
      document.querySelectorAll('.lang-section').forEach(s => s.classList.toggle('active', s.id === lang));
    }
  </script>
</body>
</html>
