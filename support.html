<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kamm — Support</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #FBF7F0;
    --text: #2B241B;
    --muted: #6B6255;
    --accent: #2F6F4F;
    --border: #E7DFD2;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #1C1712; --text: #F3ECE0; --muted: #B8AC98; --accent: #5FBE8C; --border: #3A3226; }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.65;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 64px 24px 96px; }
  header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  header .badge {
    width: 40px; height: 40px; border-radius: 12px; background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 18px;
  }
  h1 { font-size: 26px; margin: 0; }
  p { font-size: 15.5px; }
  .card {
    margin-top: 24px; padding: 20px; border: 1px solid var(--border);
    border-radius: 14px;
  }
  .card a { color: var(--accent); font-weight: 600; text-decoration: none; }
  .links { margin-top: 32px; display: flex; gap: 16px; font-size: 14px; }
  .links a { color: var(--muted); text-decoration: underline; }
  footer { margin-top: 56px; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="badge">K</div>
    <h1>Kamm Support</h1>
  </header>
  <p>Need help with Kamm, have a question about your account, or found a bug? We're happy to help.</p>
  <div class="card">
    <p style="margin:0 0 6px; color:var(--muted); font-size:13px;">Email us</p>
    <a href="mailto:itsthamer.dev@gmail.com">itsthamer.dev@gmail.com</a>
  </div>
  <div class="links">
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Service</a>
  </div>
  <footer>© 2026 Kamm. All rights reserved.</footer>
</div>
</body>
</html>
